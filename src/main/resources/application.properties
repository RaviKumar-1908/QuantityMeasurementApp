# Application Configuration Properties
# Repository Type Configuration: "cache" for in-memory, "database" for H2/MySQL/PostgreSQL
repository.type=database

# Environment Configuration (development | testing | production)
app.env=development

# ============================================================
# H2 Database Configuration (default — used in UC16)
# H2 is an embedded Java database — no external server needed.
# AUTO_SERVER=TRUE allows multiple connections to the same file.
# ============================================================
db.url=jdbc:h2:./data/quantitymeasurementdb;AUTO_SERVER=TRUE
db.username=sa
db.password=
db.driver=org.h2.Driver
db.pool-size=5

# ============================================================
# HikariCP Connection Pool Settings (used as reference values)
# ============================================================
db.hikari.maximum-pool-size=10
db.hikari.minimum-idle=2
db.hikari.connection-timeout=30000
db.hikari.idle-timeout=600000
db.hikari.max-lifetime=1800000
db.hikari.pool-name=QuantityMeasurementPool
db.hikari.connection-test-query=SELECT 1

# ============================================================
# MySQL Configuration (commented out — for future use cases)
# Uncomment and set correct values when switching to MySQL.
# ============================================================
# db.url=jdbc:mysql://localhost:3306/quantity_measurement?useSSL=false&serverTimezone=UTC
# db.username=root
# db.password=yourpassword
# db.driver=com.mysql.cj.jdbc.Driver

# ============================================================
# PostgreSQL Configuration (commented out — for future use)
# Uncomment and set correct values when switching to PostgreSQL.
# ============================================================
# db.url=jdbc:postgresql://localhost:5432/quantity_measurement
# db.username=postgres
# db.password=yourpassword
# db.driver=org.postgresql.Driver

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.quantitymeasurement=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n