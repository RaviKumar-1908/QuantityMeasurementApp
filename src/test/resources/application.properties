# Test environment application.properties
# Uses an in-memory H2 database so tests are fast and isolated.
# The database is created fresh for each test run and discarded after.

repository.type=database
app.env=test

# In-memory H2 — "mem:testdb" creates a new database that lives only during the test JVM
db.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.username=sa
db.password=
db.driver=org.h2.Driver
db.pool-size=3
db.hikari.maximum-pool-size=5
db.hikari.minimum-idle=1
